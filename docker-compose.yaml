services:
    db:
        image: postgres:8.0
        containernames: db-lett-faktura
        environment:
            POSTGRES_ROOT_PASSWORD: 123456
            POSTGRES_DATABASE: lett_faktura
        ports:
            - 5432:5432
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U postgres -d lett_faktura -h localhost -p 5432",
                ]
            interval: 10s
            retries: 5
        networks:
            - lett_faktura_network

    server:
        build:
            context: .
            dockerfile: Dockerfile
        containernames: server-lett-faktura
        environment:
            NODE_ENV: development
            PORT: 3000
            DATABASE_URL: postgres://postgres:123456@db:5432/lett_faktura
        ports:
            - 3000:3000
        depends_on:
            db:
                condition: service_healthy
        networks:
            - lett_faktura_network

networks:
    lett_faktura_network:
        driver: bridge

volumes:
    postgres_data:
        driver: local
